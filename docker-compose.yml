# ─── FPP Golden Window — docker-compose.yml ───
# 一键启动: docker compose up
#
# 首次运行会下载模型(~1GB)，后续使用缓存。

version: "3.8"

services:
  fpp:
    build: .
    image: fpp-golden-window:latest
    container_name: fpp-golden-window
    # GPU 用户取消下面两行注释:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      # 模型缓存持久化（避免每次重新下载）
      - hf_cache:/app/.cache
      # 可选：挂载本地模型目录
      # - /path/to/your/models:/models:ro
    environment:
      - HF_HOME=/app/.cache/huggingface
    command: demo
    stdin_open: true
    tty: true

volumes:
  hf_cache:
